<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="screen-login" class="screen active">
            <h1>Tic-Tac-Toe</h1>
            <form id="form-login">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p>Don't have an account? <a href="#" id="link-to-register">Register</a></p>
        </div>

        <!-- Register Screen -->
        <div id="screen-register" class="screen">
            <h1>Create Account</h1>
            <form id="form-register">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <input type="password" id="register-confirm" placeholder="Confirm password" required>
                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="#" id="link-to-login">Sign In</a></p>
        </div>

        <!-- Dashboard Screen -->
        <div id="screen-dashboard" class="screen">
            <h1>Tic-Tac-Toe</h1>
            <p>Welcome, <span id="user-greeting"></span>!</p>
            <button id="btn-new-game">New Game</button>
            <button id="btn-logout">Logout</button>
            <h2>Game History</h2>
            <div id="game-history">
                <p>No games played yet.</p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen">
            <h1>Tic-Tac-Toe</h1>
            <p id="game-status">Your turn (X)</p>
            <div id="board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <button id="btn-back">Back to Dashboard</button>
        </div>

        <!-- Loading overlay -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
