<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крестики-нолики</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <section id="screen-login" class="screen active">
      <div class="form-container">
        <h1>Вход</h1>
        <form id="form-login">
          <div class="form-group">
            <label for="login-username">Имя пользователя</label>
            <input type="text" id="login-username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="login-password">Пароль</label>
            <input type="password" id="login-password" required autocomplete="current-password">
          </div>
          <div id="login-error" class="error-message"></div>
          <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <p class="form-link">
          Нет аккаунта? <a href="#" id="link-to-register">Зарегистрироваться</a>
        </p>
      </div>
    </section>

    <!-- Register Screen -->
    <section id="screen-register" class="screen">
      <div class="form-container">
        <h1>Регистрация</h1>
        <form id="form-register">
          <div class="form-group">
            <label for="register-username">Имя пользователя</label>
            <input type="text" id="register-username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="register-password">Пароль</label>
            <input type="password" id="register-password" required autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="register-confirm">Подтвердите пароль</label>
            <input type="password" id="register-confirm" required autocomplete="new-password">
          </div>
          <div id="register-error" class="error-message"></div>
          <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
        <p class="form-link">
          Уже есть аккаунт? <a href="#" id="link-to-login">Войти</a>
        </p>
      </div>
    </section>

    <!-- Dashboard Screen -->
    <section id="screen-dashboard" class="screen">
      <div class="dashboard-container">
        <header class="dashboard-header">
          <h1>Крестики-нолики</h1>
          <div class="user-info">
            <span id="greeting">Привет, <span id="username-display"></span>!</span>
            <button id="btn-logout" class="btn btn-secondary">Выйти</button>
          </div>
        </header>

        <div class="dashboard-actions">
          <button id="btn-new-game" class="btn btn-primary btn-large">Новая игра</button>
        </div>

        <div class="dashboard-history">
          <h2>История игр</h2>
          <div id="history-loading" class="loading">Загрузка истории...</div>
          <div id="history-empty" class="empty-state">У вас пока нет игр. Начните новую!</div>
          <div id="history-error" class="error-message"></div>
          <div id="history-table-wrapper">
            <table id="history-table">
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Противник</th>
                  <th>Результат</th>
                </tr>
              </thead>
              <tbody id="history-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- Game Screen -->
    <section id="screen-game" class="screen">
      <div class="game-container">
        <header class="game-header">
          <button id="btn-back" class="btn btn-secondary">← Назад</button>
          <h1>Крестики-нолики</h1>
          <div id="game-status" class="game-status">Ход: X</div>
        </header>

        <div id="game-loading" class="loading">Загрузка игры...</div>
        <div id="game-error" class="error-message"></div>

        <div class="board-wrapper">
          <div id="board" class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
          </div>
        </div>

        <div id="game-result" class="game-result"></div>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
